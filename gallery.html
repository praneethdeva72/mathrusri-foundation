<head>
  <meta charset="UTF-8">

  <meta name="description" content="Explore photo highlights from Mathrusri Foundation events and activities.">
  <meta name="keywords" content="non-profit, charity, education aid, community service, food donation, healthcare, Mathrusri Foundation, donation">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css.css">
  <style>
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      cursor: pointer;
    }
    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: rgba(99,102,241,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 14px;
    }
    .gallery-overlay i {
      color: #fff;
      font-size: 1.8rem;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .lightbox.open {
      display: flex;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .lightbox-close {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .lightbox-close:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg sticky-top main-nav">
  <div class="container">
    <a class="navbar-brand text-light fw-bold d-flex align-items-center gap-2" href="index.html">
      <img src="pictures/deva.webp" alt="Logo" width="38" height="38"> Mathrusri Foundation
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav gap-1 align-items-lg-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="members.html">Members</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="donate.html">Donate</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero text-center" data-aos="fade-up">
  <div class="container">
    <h1 class="gradient-text mb-3 display-4 fw-bold">Our Gallery</h1>
    <p class="lead">Moments captured from our community service and outreach programs.</p>
  </div>
</section>

<!-- Gallery Grid -->
<section class="container py-5">
  <div class="row g-4" id="galleryGrid">

    <div class="col-md-4 col-sm-6" data-aos="zoom-in">
      <div class="gallery-item" onclick="openLightbox('pictures/gallery1.jpg')">
        <img src="pictures/gallery1.jpg" alt="Community Service" class="gallery-img" loading="lazy">
        <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
      </div>
    </div>

    <div class="col-md-4 col-sm-6" data-aos="zoom-in" data-aos-delay="80">
      <div class="gallery-item" onclick="openLightbox('pictures/gallery2.jpg')">
        <img src="pictures/gallery2.jpg" alt="Education Program" class="gallery-img" loading="lazy">
        <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
      </div>
    </div>

    <div class="col-md-4 col-sm-6" data-aos="zoom-in" data-aos-delay="160">
      <div class="gallery-item" onclick="openLightbox('pictures/gallery3.jpg')">
        <img src="pictures/gallery3.jpg" alt="Healthcare Camp" class="gallery-img" loading="lazy">
        <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
      </div>
    </div>

    <div class="col-md-4 col-sm-6" data-aos="zoom-in" data-aos-delay="0">
      <div class="gallery-item" onclick="openLightbox('pictures/gallery4.jpg')">
        <img src="pictures/gallery4.jpg" alt="Food Drive" class="gallery-img" loading="lazy">
        <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
      </div>
    </div>

    <div class="col-md-4 col-sm-6" data-aos="zoom-in" data-aos-delay="80">
      <div class="gallery-item" onclick="openLightbox('pictures/gallery5.jpg')">
        <img src="pictures/gallery5.jpg" alt="Volunteer Work" class="gallery-img" loading="lazy">
        <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
      </div>
    </div>

    <div class="col-md-4 col-sm-6" data-aos="zoom-in" data-aos-delay="160">
      <div class="gallery-item" onclick="openLightbox('pictures/gallery6.jpg')">
        <img src="pictures/gallery6.jpg" alt="Community Event" class="gallery-img" loading="lazy">
        <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
      </div>
    </div>

  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">✕</button>
  <img id="lightboxImg" src="" alt="Gallery Image">
</div>

<!-- Footer -->
<footer class="footer-section text-center">
  <div class="container">
    <p class="mb-1">© 2025 Mathrusri Foundation. Designed by
      <a href="https://instagram.com/praneethdeva_46" target="_blank" rel="noopener" class="footer-link">
        <i class="fab fa-instagram"></i> praneethdeva_46
      </a>
    </p>
  </div>
</footer>

<button id="scrollTop" aria-label="Scroll to top">↑</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({ once: true, duration: 600, easing: 'ease-out' });
  const scrollBtn = document.getElementById('scrollTop');
  window.addEventListener('scroll', () => scrollBtn.classList.toggle('visible', window.scrollY > 400));
  scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e) {
    if (!e || e.target !== document.getElementById('lightboxImg')) {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>

</body>
</html>
